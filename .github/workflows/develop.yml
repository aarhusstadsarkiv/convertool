name: Develop

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v1
      - name: Set up Python 3.7
        uses: actions/setup-python@v1
        with:
          python-version: 3.7
      - name: Install tools
        run: |
          pip install flake8 black --quiet
      - name: Run flake8
        run: |
          flake8 convertool/
          flake8 tests/
      - name: Run black
        run: |
          black --check convertool/
          black --check tests/
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v1
      - name: Set up Python 3.7
        uses: actions/setup-python@v1
        with:
          python-version: 3.7
      - name: Install tools
        run: pip install mypy prospector --quiet
      - name: Run mypy
        run: |
          mypy convertool/
          mypy tests/
      - name: Run prospector
        run: |
          prospector -M

