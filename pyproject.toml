[tool.poetry]
name = "convertool"
version = "0.3.0"
description = ""
authors = ["Nina Jensen <jnik@aarhus.dk>"]

[tool.poetry.dependencies]
python = "^3.7"
click = "^7.0"
tqdm = "^4.41.0"
pillow = "^6.2.1"
humanize = "^0.5.1"
pydantic = "^1.4"
pyautogui = "^0.9.48"


[tool.poetry.dev-dependencies]
pytest = "^5.2"
pytest-cov = "^2.8.1"
mypy = "^0.740.0"
prospector = "^1.1"
black = {version = "^19.10b0", allow-prereleases = true}

[tool.poetry.scripts]
convertool = "convertool.cli:cli"

[tool.black]
line-length = 79

[build-system]
requires = ["poetry>=0.12"]
build-backend = "poetry.masonry.api"
